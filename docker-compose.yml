services:
  nginx:
    image: nginx:1.25
    ports:
      - "4001:80"
    networks:
      - frontend
      - backend
    volumes:
      - ./html:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    image: php:8.2-fpm
    networks:
      - backend
    volumes:
      - ./html:/var/www/html
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: testdb
    networks:
      - backend
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.2
    ports:
      - "6001:80"
    environment:
      PMA_HOST: mysql
    networks:
      - backend
    depends_on:
      - mysql

networks:
  frontend:
  backend:

volumes:
  mysql_data: